function hevyParseMs(t) {
  if (!t) return 0;
  if (typeof t === 'number') return t * 1000;
  const ms = new Date(t).getTime();
  return isNaN(ms) ? 0 : ms;
}

    total + (e.sets||[]).reduce((s, set) =>

}
