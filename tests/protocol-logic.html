<script>
// ── pbFreqToInjectionsPerWeek ──
function pbFreqToInjectionsPerWeek(freq) {
  if (Array.isArray(freq)) return freq.length;
  const f = (freq || '').toUpperCase().trim();
  if (f === 'ED')       return 7;
  if (f === 'EOD')      return 3.5;
  if (f === 'E3D')      return 7 / 3;
  if (f === 'E3.5D' || f === '2X/WK') return 2;
  if (f === 'E4D')      return 7 / 4;
  if (f === 'E5D')      return 7 / 5;
  if (f === '3X/WK')   return 3;
  if (f === 'WEEKLY')   return 1;
  if (f === 'BI-WKLY')  return 0.5;
  if (f === 'MONTHLY')  return 7 / 30;
  if (f === 'PWO')      return 7;
  return 1;
}

section('pbFreqToInjectionsPerWeek');
assert('ED → 7',                       pbFreqToInjectionsPerWeek('ED'), 7);
assert('EOD → 3.5',                    pbFreqToInjectionsPerWeek('EOD'), 3.5);
assert('E3.5D → 2',                    pbFreqToInjectionsPerWeek('E3.5D'), 2);
assert('Weekly → 1',                   pbFreqToInjectionsPerWeek('Weekly'), 1);
assert('PWO → 7',                      pbFreqToInjectionsPerWeek('PWO'), 7);
assert('array [Mon,Thu] → 2',          pbFreqToInjectionsPerWeek(['Mon','Thu']), 2);
assert('array [Mon,Wed,Fri] → 3',      pbFreqToInjectionsPerWeek(['Mon','Wed','Fri']), 3);
assert('empty string → 1',             pbFreqToInjectionsPerWeek(''), 1);
assert('null → 1',                     pbFreqToInjectionsPerWeek(null), 1);

// ── normalizeProtocol ──
function normalizeProtocol(p) {
  if (!p) return p;
  const weeks = parseInt(p.cycleLengthWeeks || p.weeks) || 12;
  const compounds = (p.compounds || []).map(c => {
    if (Array.isArray(c.phases)) return c;
    const dose = parseFloat(c.perInjection || c.dose) || 0;
    return {
      name: c.name || '',
      cat: c.cat || '',
      unit: c.unit || '',
      freq: c.freq || 'Weekly',
      phases: [{ startWeek: 1, endWeek: weeks, dose }]
    };
  });
  return {
    ...p,
    cycleLengthWeeks: weeks,
    startDate: p.startDate || '',
    status: p.status || 'planning',
    compounds,
    modificationLog: p.modificationLog || []
  };
}

// ── phaseWeeklyTotal ──
function phaseWeeklyTotal(phase, freq) {
  return parseFloat((phase.dose * pbFreqToInjectionsPerWeek(freq)).toFixed(2));
}

// ── buildWeekGrid ──
function buildWeekGrid(compounds, totalWeeks) {
  const weeks = Array.from({ length: totalWeeks }, (_, i) => i + 1);
  const rows = compounds.map(c => ({
    name: c.name,
    unit: c.unit,
    freq: c.freq,
    cells: weeks.map(w => {
      const ph = (c.phases || []).find(p => w >= p.startWeek && w <= p.endWeek);
      return ph ? String(ph.dose) : null;
    })
  }));
  return { weeks, rows };
}

section('Protocol switching — _pbCloseOutOld logic');

// Set up localStorage with a fake active protocol
(function() {
  function lsGet(key, fallback) {
    const raw = localStorage.getItem(key);
    if (raw == null) return fallback;
    try { return JSON.parse(raw); } catch(e) { return fallback; }
  }

  const fakeProtocol = {
    saved_at: 'test-saved-at-001',
    name: 'Test Cycle',
    status: 'active',
    cycleLengthWeeks: 12,
    startDate: '2026-01-01',
    compounds: [],
    modificationLog: []
  };
  localStorage.setItem('hrt_protocols', JSON.stringify([fakeProtocol]));
  localStorage.setItem('hrt_active_protocol', 'test-saved-at-001');

  // Copy _pbCloseOutOld logic inline for testing (since it reads from localStorage)
  function testCloseOutOld(closedAs, week, note) {
    const currentSavedAt = localStorage.getItem('hrt_active_protocol');
    if (!currentSavedAt) return;
    const allRaw = lsGet('hrt_protocols', []);
    const idx = allRaw.findIndex(p => p.saved_at === currentSavedAt);
    if (idx === -1) return;
    const p = normalizeProtocol(allRaw[idx]);
    p.status = closedAs;
    p.modificationLog = p.modificationLog || [];
    p.modificationLog.push({ type: 'cycle_closed', closed_as: closedAs, week: week || null, note: note || '', ts: Date.now() });
    allRaw[idx] = p;
    localStorage.setItem('hrt_protocols', JSON.stringify(allRaw));
    localStorage.removeItem('hrt_active_protocol');
    localStorage.removeItem('hrt_active_protocol_data');
  }

  testCloseOutOld('completed', 12, 'Full cycle done');

  const updated = lsGet('hrt_protocols', []);
  assert('close-out sets status to completed', updated[0].status, 'completed');
  assert('close-out pushes cycle_closed log entry', updated[0].modificationLog.length, 1);
  assert('cycle_closed log entry has correct type', updated[0].modificationLog[0].type, 'cycle_closed');
  assert('cycle_closed log entry closed_as completed', updated[0].modificationLog[0].closed_as, 'completed');
  assert('cycle_closed log entry week', updated[0].modificationLog[0].week, 12);
  assert('cycle_closed log entry note', updated[0].modificationLog[0].note, 'Full cycle done');
  assert('hrt_active_protocol cleared after close-out', localStorage.getItem('hrt_active_protocol'), null);
  assert('hrt_active_protocol_data cleared after close-out', localStorage.getItem('hrt_active_protocol_data'), null);

  // Test abandoned / skip path
  localStorage.setItem('hrt_protocols', JSON.stringify([{
    saved_at: 'test-saved-at-002',
    name: 'Test Cycle 2',
    status: 'active',
    cycleLengthWeeks: 16,
    startDate: null,
    compounds: [],
    modificationLog: []
  }]));
  localStorage.setItem('hrt_active_protocol', 'test-saved-at-002');

  testCloseOutOld('abandoned', null, '');
  const updated2 = lsGet('hrt_protocols', []);
  assert('skip close-out sets status to abandoned', updated2[0].status, 'abandoned');
  assert('skip close-out week is null when no startDate', updated2[0].modificationLog[0].week, null);

// ── isDueToday ──
function isDueToday(freq, startDate) {
  const todayDay = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
  if (Array.isArray(freq)) return freq.includes(todayDay);
  const f = (freq || '').toUpperCase().trim();
  if (f === 'ED' || f === 'PWO') return true;
  if (!startDate) return false;
  const [sy, sm, sd] = startDate.split('-').map(Number);
  const start = new Date(sy, sm - 1, sd);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  start.setHours(0, 0, 0, 0);
  const daysSinceStart = Math.round((today - start) / 86400000);
  const startDay = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][start.getDay()];
  if (f === 'EOD')   return daysSinceStart % 2 === 0;
  if (f === 'E3D')   return daysSinceStart % 3 === 0;
  if (f === 'E4D')   return daysSinceStart % 4 === 0;
  if (f === 'E5D')   return daysSinceStart % 5 === 0;
  if (f === 'E3.5D' || f === '2X/WK') {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const si = days.indexOf(startDay);
    return todayDay === startDay || todayDay === days[(si + 3) % 7];
  }
  if (f === '3X/WK') {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const si = days.indexOf(startDay);
    return todayDay === startDay || todayDay === days[(si + 2) % 7] || todayDay === days[(si + 4) % 7];
  }
  if (f === 'WEEKLY')   return todayDay === startDay;
  if (f === 'BI-WKLY')  return todayDay === startDay && daysSinceStart % 14 === 0;
  if (f === 'MONTHLY')  return new Date().getDate() === start.getDate();
  return false;
}

section('isDueToday');
(function() {
  const todayStr     = new Date().toISOString().split('T')[0];
  const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  const todayDay     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];
  // Find a weekday that is NOT today for negative tests
  const otherDays    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].filter(d => d !== todayDay);
  const notTodayDay  = otherDays[0];
  // A start date whose weekday === notTodayDay (go back in time until we find it)
  function startDateForWeekday(day) {
    const target = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].indexOf(day);
    for (let i = 1; i <= 7; i++) {
      const d = new Date(Date.now() - i * 86400000);
      if (d.getDay() === target) return d.toISOString().split('T')[0];
    }
  }
  const notTodayStart = startDateForWeekday(notTodayDay);

  assert('ED always true regardless of startDate',        isDueToday('ED', yesterdayStr), true);
  assert('PWO always true regardless of startDate',       isDueToday('PWO', yesterdayStr), true);
  assert('ED true even with no startDate',                isDueToday('ED', ''), true);
  assert('EOD startDate=today (0 days) → true',          isDueToday('EOD', todayStr), true);
  assert('EOD startDate=yesterday (1 day) → false',      isDueToday('EOD', yesterdayStr), false);
  assert('Weekly startDate=today (same weekday) → true', isDueToday('Weekly', todayStr), true);
  assert('Weekly startDate=other weekday → false',       isDueToday('Weekly', notTodayStart), false);
  assert('array includes todayDay → true',               isDueToday([todayDay], todayStr), true);
  assert('array excludes todayDay → false',              isDueToday([notTodayDay], todayStr), false);
  assert('named freq no startDate → false',              isDueToday('EOD', ''), false);
  assert('unknown freq → false',                         isDueToday('BIMONTHLY', todayStr), false);
  // Timezone regression: 2026-06-22 is a known Monday — local-time parsing must yield Mon
  const isMonday = new Date().getDay() === 1;
  assert('Weekly 2026-06-22 (known Monday) returns true iff today is Monday [timezone regression]',
    isDueToday('Weekly', '2026-06-22'), isMonday);
})();

// ── daysUntilNextDose ──
function daysUntilNextDose(freq, startDate) {
  const f = Array.isArray(freq) ? '' : (freq || '').toUpperCase().trim();
  if (f === 'ED' || f === 'PWO') return null;
  for (let d = 0; d <= 6; d++) {
    const candidate = new Date();
    candidate.setHours(0, 0, 0, 0);
    candidate.setDate(candidate.getDate() + d);
    const cDay = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][candidate.getDay()];
    if (Array.isArray(freq)) { if (freq.includes(cDay)) return d; continue; }
    if (!startDate) continue;
    const [sy, sm, sd] = startDate.split('-').map(Number);
    const start = new Date(sy, sm - 1, sd);
    start.setHours(0, 0, 0, 0);
    const daysSince = Math.round((candidate - start) / 86400000);
    const startDay  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][start.getDay()];
    if (f === 'EOD'  && daysSince % 2 === 0) return d;
    if (f === 'E3D'  && daysSince % 3 === 0) return d;
    if (f === 'E4D'  && daysSince % 4 === 0) return d;
    if (f === 'E5D'  && daysSince % 5 === 0) return d;
    if (f === 'E3.5D' || f === '2X/WK') {
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const si = days.indexOf(startDay);
      if (cDay === startDay || cDay === days[(si + 3) % 7]) return d; continue;
    }
    if (f === '3X/WK') {
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const si = days.indexOf(startDay);
      if (cDay === startDay || cDay === days[(si+2)%7] || cDay === days[(si+4)%7]) return d; continue;
    }
    if (f === 'WEEKLY'  && cDay === startDay) return d;
    if (f === 'BI-WKLY' && cDay === startDay && daysSince % 14 === 0) return d;
    if (f === 'MONTHLY' && candidate.getDate() === start.getDate()) return d;
  }
  return null;
}

section('daysUntilNextDose');
(function() {
  const todayStr     = new Date().toISOString().split('T')[0];
  const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  const todayDay     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][new Date().getDay()];

  assert('ED → null (every day, no countdown)',          daysUntilNextDose('ED', todayStr), null);
  assert('PWO → null',                                   daysUntilNextDose('PWO', todayStr), null);
  assert('EOD startDate=today → 0 (due today)',          daysUntilNextDose('EOD', todayStr), 0);
  assert('EOD startDate=yesterday → 1 (due tomorrow)',   daysUntilNextDose('EOD', yesterdayStr), 1);
  assert('Weekly startDate=today (same weekday) → 0',   daysUntilNextDose('Weekly', todayStr), 0);
  assert('array [todayDay] → 0',                        daysUntilNextDose([todayDay], todayStr), 0);
  assert('named freq no startDate → null',              daysUntilNextDose('EOD', ''), null);
  // Timezone regression: 2026-06-22 is a known Monday — local-time parsing must yield Mon
  const isMonday = new Date().getDay() === 1;
  const wkResult = daysUntilNextDose('Weekly', '2026-06-22');
  assert('Weekly 2026-06-22 (known Monday) returns 0 on Mondays, >0 otherwise [timezone regression]',
    wkResult === 0, isMonday);
})();

// ── buildWeekStrip ──
function buildWeekStrip(currentWeek, totalWeeks) {
  const squares = [];
  for (let w = 1; w <= totalWeeks; w++) {
    if (w < currentWeek) {
      squares.push(`<div style="width:14px;height:14px;border-radius:2px;background:var(--primary);opacity:0.3;flex-shrink:0;" title="Week ${w}"></div>`);
    } else if (w === currentWeek) {
      squares.push(
        `<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">` +
        `<div style="width:14px;height:14px;border-radius:2px;background:var(--primary);" title="Week ${w}"></div>` +
        `<div style="font-size:8px;color:var(--primary-bright);margin-top:2px;font-family:var(--font-data);white-space:nowrap;">Wk ${w}</div>` +
        `</div>`
      );
    } else {
      squares.push(`<div style="width:14px;height:14px;border-radius:2px;border:1px solid var(--primary);opacity:0.4;flex-shrink:0;" title="Week ${w}"></div>`);
    }
  }
  return `<div style="display:flex;gap:3px;align-items:flex-end;padding:2px 0;">${squares.join('')}</div>`;
}

section('buildWeekStrip');
(function() {
  assert('returns a non-empty string',
    typeof buildWeekStrip(3, 10) === 'string' && buildWeekStrip(3, 10).length > 0, true);
  assert('contains current week label "Wk 3" when currentWeek=3',
    buildWeekStrip(3, 10).includes('Wk 3'), true);
  assert('does NOT contain "Wk 2" label when currentWeek=3 (past weeks have no label)',
    buildWeekStrip(3, 10).includes('Wk 2'), false);
  assert('week 1 of 1 is just the current week, no past or future',
    buildWeekStrip(1, 1).includes('Wk 1'), true);
  assert('totalWeeks=0 returns empty wrapper div',
    buildWeekStrip(1, 0), '<div style="display:flex;gap:3px;align-items:flex-end;padding:2px 0;"></div>');
  assert('contains "Wk 12" label when currentWeek=12',
    buildWeekStrip(12, 12).includes('Wk 12'), true);
  assert('currentWeek beyond totalWeeks shows no label (caller must clamp)',
    buildWeekStrip(11, 10).includes('Wk 11'), false);
})();

// ── Mood extraction logic ──
function extractLatestMood(logs) {
  const moodLogs = logs.filter(l => l.mood && parseInt(l.mood) > 0);
  if (!moodLogs.length) return null;
  return parseInt(moodLogs[0].mood);
}

section('Mood extraction');
(function() {
  assert('empty logs → null',
    extractLatestMood([]), null);
  assert('single entry with mood returns its value',
    extractLatestMood([{ mood: '7' }]), 7);
  assert('picks first (newest) entry when multiple have mood',
    extractLatestMood([{ mood: '8', date: '2026-06-10' }, { mood: '5', date: '2026-06-09' }]), 8);
  assert('skips entries without mood field',
    extractLatestMood([{ weight: '150' }, { mood: '6' }]), 6);
  assert('ignores mood: "0" (zero is falsy after parseInt check)',

  assert('badge is "Good" for mood >= 8',

    })(), 'Low');
})();

<script>
// ── getCycleChartData ──
function getCycleChartData(logs, fieldKey, protocol) {
  const filtered = logs.filter(l => l[fieldKey] && parseFloat(l[fieldKey]) > 0);
  const startDate = protocol && (protocol.startDate || protocol.saved_at);
  const cycleLengthWeeks = protocol && (protocol.cycleLengthWeeks || parseInt(protocol.weeks) || 0);
  const usingCycle = !!(startDate && cycleLengthWeeks > 0);
  let entries = usingCycle
    ? filtered.filter(l => l.date >= startDate)
    : filtered.slice(0, 30);
  entries = [...entries].reverse(); // oldest-first
  let labels;
  if (usingCycle) {
    const [sy, sm, sd] = startDate.split('-').map(Number);
    const startMs = new Date(sy, sm - 1, sd).getTime();
    labels = entries.map(l => {
      const [ly, lm, ld] = l.date.split('-').map(Number);
      const daysSinceStart = Math.round((new Date(ly, lm - 1, ld).getTime() - startMs) / 86400000);
      return `Wk ${Math.ceil((daysSinceStart + 1) / 7)}`;
    });
  } else {
    labels = entries.map(l => {
      const [y, m, d] = l.date.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    });
  }
  return { entries, labels };
}

section('getCycleChartData');
(function() {
  const proto = { startDate: '2026-06-01', cycleLengthWeeks: 4 };
  // logs newest-first, as stored in hrt_vitals_log
  const logs = [
    { date: '2026-06-21', weight: '195', mood: '8' },  // day 20 → Wk 3
    { date: '2026-06-14', weight: '196', mood: '7' },  // day 13 → Wk 2
    { date: '2026-06-07', weight: '197', mood: '6' },  // day 6  → Wk 1
    { date: '2026-06-01', weight: '198', mood: '5' },  // day 0  → Wk 1
  ];

  const { entries: e1, labels: l1 } = getCycleChartData(logs, 'weight', proto);
  assert('cycle: returns 4 entries', e1.length, 4);
  assert('cycle: oldest entry first', e1[0].date, '2026-06-01');
  assert('cycle: newest entry last', e1[3].date, '2026-06-21');
  assert('cycle: day 0 → Wk 1', l1[0], 'Wk 1');
  assert('cycle: day 6 → Wk 1', l1[1], 'Wk 1');
  assert('cycle: day 13 → Wk 2', l1[2], 'Wk 2');
  assert('cycle: day 20 → Wk 3', l1[3], 'Wk 3');

  const { entries: e2, labels: l2 } = getCycleChartData(logs, 'weight', null);
  assert('no protocol: returns entries oldest-first', e2[0].date, '2026-06-01');
  assert('no protocol: labels are not Wk format', l2[0].includes('Wk'), false);

  const mixedLogs = [{ date: '2026-06-21', mood: '8' }, { date: '2026-06-14', weight: '196' }];
  const { entries: e3 } = getCycleChartData(mixedLogs, 'weight', null);
  assert('filters out entries missing fieldKey', e3.length, 1);

  const { entries: e4, labels: l4 } = getCycleChartData([], 'mood', proto);
  assert('empty logs → empty entries', e4.length, 0);
  assert('empty logs → empty labels', l4.length, 0);

  const withOld = [{ date: '2026-06-21', weight: '195' }, { date: '2026-05-31', weight: '200' }];
  const { entries: e5 } = getCycleChartData(withOld, 'weight', proto);
  assert('cycle: excludes entries before startDate', e5.length, 1);

  const onStart = [{ date: '2026-06-01', weight: '198' }];
  assert('cycle: includes entry on startDate', getCycleChartData(onStart, 'weight', proto).entries.length, 1);
})();
</script>

// ── summary ──
results.innerHTML += `<h2 style="color:${failed ? '#EF4444' : '#10B981'}">${passed} passed, ${failed} failed</h2>`;
</script>
